version: 2

project_name: llm-usage-exporter

before:
  hooks:
    - go mod tidy

builds:
  - id: llm-usage-exporter
    main: ./cmd/llm-usage-exporter
    binary: llm-usage-exporter
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - "-s -w -X main.version={{.Version}}"

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - examples/llm-usage-exporter.yaml

checksum:
  name_template: "checksums.txt"

changelog:
  use: github

release:
  draft: false
  replace_existing_draft: true

sboms:
  - artifacts: archive
