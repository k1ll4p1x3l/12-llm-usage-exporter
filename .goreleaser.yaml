version: 2

project_name: llm-usage-exporter

before:
  hooks:
    - go mod tidy

builds:
  - id: llm-usage-exporter
    main: ./cmd/llm-usage-exporter
    binary: llm-usage-exporter
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - "-s -w -X main.version={{.Version}}"

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github

release:
  draft: false
  replace_existing_draft: true

sboms:
  - artifacts: all
