name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Check formatting
        run: |
          if [ -n "$(find . -name '*.go' -type f -print0 | xargs -0 gofmt -l)" ]; then
            echo "Go files are not formatted"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...
