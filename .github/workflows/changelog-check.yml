name: Changelog Check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  ensure-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Require changelog touch
        uses: actions/github-script@v7
        with:
          script: |
            const bypassLabel = (context.payload.pull_request.labels || [])
              .some((label) => label.name === "no-changelog-required");

            if (bypassLabel) {
              core.info("Changelog check bypassed by label `no-changelog-required`.");
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const touchesChangelog = files.some((file) => file.filename === "CHANGELOG.md");

            if (!touchesChangelog) {
              core.setFailed("Please update CHANGELOG.md or add the `no-changelog-required` label.");
            }
