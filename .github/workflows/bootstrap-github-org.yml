name: Bootstrap GitHub Org Metadata

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview planned changes without mutating GitHub data."
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap milestones and labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          REQUIRE_BRANCH_PROTECTION: "0"
        run: ./scripts/bootstrap-github-org.sh
